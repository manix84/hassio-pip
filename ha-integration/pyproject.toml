[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
  "B",
  "E",
  "F",
  "I",
  "N",
  "UP",
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components"]

[tool.mypy]
python_version = "3.12"
explicit_package_bases = true
strict = true
warn_return_any = true
warn_unused_configs = true
