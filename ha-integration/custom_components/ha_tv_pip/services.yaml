show_camera:
  fields:
    receiver_device_id:
      required: false
      selector:
        device:
          integration: ha_tv_pip
      name: Receiver device
      description: Paired Android TV or Google TV receiver to display the camera on.
    camera_entity:
      required: true
      selector:
        entity:
          domain: camera
      name: Camera entity
      description: Camera entity to display on the paired receiver. Use a TV-compatible H.264 or lower-resolution stream where possible.
    duration_seconds:
      default: 30
      selector:
        number:
          min: 1
          max: 3600
          mode: box
          unit_of_measurement: seconds
      name: Duration
      description: How long the receiver should keep the display open.
    enter_pip:
      default: true
      selector:
        boolean:
      name: Enter PiP
      description: Ask the receiver to use PiP or overlay mode when available.
    snapshot_fallback:
      default: true
      selector:
        boolean:
      name: Snapshot fallback
      description: Show a camera snapshot while the video stream loads, when Home Assistant exposes one.
    snapshot_camera_entity:
      required: false
      selector:
        entity:
          domain: camera
      name: Snapshot fallback camera entity
      description: Optional camera entity to use for the loading snapshot. Defaults to the main camera entity.
    stream_type:
      default: auto
      selector:
        select:
          options:
            - auto
            - hls
            - snapshot
      name: Stream type
      description: Choose automatic handling, force an HLS stream, or send a snapshot through the camera service.
    title:
      required: false
      selector:
        text:
      name: Title
      description: Optional display title. Defaults to the camera friendly name.
    message:
      required: false
      selector:
        text:
          multiline: true
      name: Message
      description: Optional smaller text to overlay on the camera popup.
    position:
      default: top_right
      selector:
        select:
          options:
            - top_right
            - top_left
            - bottom_right
            - bottom_left
      name: Position
      description: Corner where optional overlay text should appear.
    title_color:
      default: "#50BFF2"
      selector:
        text:
      name: Title color
      description: Hex color for the title text when message overlay is used.
    title_size:
      default: 24
      selector:
        number:
          min: 10
          max: 48
          mode: box
      name: Title size
      description: Title text size when message overlay is used.
    message_color:
      default: "#fbf5f5"
      selector:
        text:
      name: Message color
      description: Hex color for the message text.
    message_size:
      default: 18
      selector:
        number:
          min: 10
          max: 40
          mode: box
      name: Message size
      description: Message text size.
    background_color:
      default: "#0f0e0e"
      selector:
        text:
      name: Background color
      description: Hex color for the optional text overlay background.
