    restream_provider:
      required: false
      selector:
        text:
      name: Restream provider
      description: Optional label for the restream source, such as go2rtc. This is used for diagnostics only.
      example: go2rtc
    snapshot_camera_entity:
      required: false
      selector:
        entity:
          domain: camera
      name: Snapshot fallback camera entity
      description: Optional camera entity to use for snapshot compatibility checks and saved defaults.
    stream_type:
      selector:
        select:
          options:
            - auto
            - hls
            - mjpeg
            - mjpeg_first
            - snapshot
      name: Preferred stream strategy
      description: Optional stream strategy to evaluate alongside the calibration result.
      example: auto
    duration_seconds:
      selector:
        number:
          min: 1
          max: 3600
          mode: box
          unit_of_measurement: seconds
      name: Duration
