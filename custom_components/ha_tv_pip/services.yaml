test_camera_stream:
  target:
    device:
      integration: ha_tv_pip
  fields:
    camera_entity:
      required: true
      selector:
        entity:
          domain: camera
      name: Camera entity
      description: Camera entity to test against the selected receiver.
    stream_camera_entity:
      required: false
      selector:
        entity:
          domain: camera
      name: Stream camera entity
      description: Optional camera entity to use for live stream compatibility checks.
    restream_url:
      required: false
      selector:
        text:
      name: Restream URL
      description: Optional direct HLS or MJPEG URL from go2rtc or another restreaming tool to test against the receiver.
      example: http://homeassistant.local:1984/api/stream.m3u8?src=front_door
    restream_provider:
      required: false
      selector:
        text:
      name: Restream provider
      description: Optional label for the restream source, such as go2rtc. This is used for diagnostics only.
      example: go2rtc
    snapshot_camera_entity:
      required: false
      selector:
        entity:
          domain: camera
      name: Snapshot fallback camera entity
      description: Optional camera entity to use for snapshot compatibility checks.
    stream_type:
      selector:
        select:
          options:
            - auto
            - hls
            - mjpeg
            - mjpeg_first
            - snapshot
      name: Preferred stream strategy
      description: Optional stream strategy to evaluate alongside the compatibility result.
      example: auto
    snapshot_fallback:
      selector:
        boolean:
      name: Snapshot fallback
      description: Optional snapshot fallback preference to include in the compatibility context.
      example: true
    save_recommendation:
      selector:
        boolean:
      name: Save recommendation
      description: Save the recommended stream strategy and any explicit test fields as per-camera defaults.
      example: false
