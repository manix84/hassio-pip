name: Release 📦

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-release:
    name: Package release assets 🚀
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36.1" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read release version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check version consistency
        run: npm run version:check

      - name: Build Android debug APK
        run: npm run android:assemble:debug

      - name: Build Android release APK
        run: npm run android:assemble:release

      - name: Prepare Android release assets
        run: |
          mkdir -p dist
          cp android-tv-app/app/build/outputs/apk/debug/app-debug.apk "dist/ha-tv-pip-android-debug-v${{ steps.version.outputs.version }}.apk"
          cp android-tv-app/app/build/outputs/apk/release/app-release-unsigned.apk "dist/ha-tv-pip-android-release-v${{ steps.version.outputs.version }}.apk"

      - name: Package Home Assistant integration
        run: npm run package:integration

      - name: Create draft GitHub Release with assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')
            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release $RELEASE_TAG already exists and is published."
              echo "Published releases can be immutable, so assets cannot be replaced."
              echo "Bump the root package.json version before creating another release."
              exit 1
            fi

            gh release upload "$RELEASE_TAG" \
              "dist/ha-tv-pip-android-debug-v$RELEASE_VERSION.apk" \
              "dist/ha-tv-pip-android-release-v$RELEASE_VERSION.apk" \
              "dist/ha-tv-pip-integration-v$RELEASE_VERSION.zip" \
              "dist/ha-tv-pip-integration.zip" \
              --clobber
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            "dist/ha-tv-pip-android-debug-v$RELEASE_VERSION.apk" \
            "dist/ha-tv-pip-android-release-v$RELEASE_VERSION.apk" \
            "dist/ha-tv-pip-integration-v$RELEASE_VERSION.zip" \
            "dist/ha-tv-pip-integration.zip" \
            --draft \
            --target "${{ github.sha }}" \
            --title "HA TV PiP v$RELEASE_VERSION" \
            --notes "Automated release for v$RELEASE_VERSION."

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release edit "$RELEASE_TAG" --draft=false
