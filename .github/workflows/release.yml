name: Release Apps & Integration 📦

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    name: Setup release metadata 🧭
    runs-on: ubuntu-latest

    outputs:
      release_state: ${{ steps.release_state.outputs.release_state }}
      release_state_reason: ${{ steps.release_state.outputs.release_state_reason }}
      should_release: ${{ steps.release_state.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read release version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check release state
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "release_state=draft" >> "$GITHUB_OUTPUT"
              echo "release_state_reason=Draft release $RELEASE_TAG already exists; release jobs will update and publish it." >> "$GITHUB_OUTPUT"
              echo "Draft release $RELEASE_TAG already exists. Release jobs will update and publish it." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "release_state=published" >> "$GITHUB_OUTPUT"
              echo "release_state_reason=Published release $RELEASE_TAG already exists; no version bump detected, so release jobs were skipped." >> "$GITHUB_OUTPUT"
              echo "Published release $RELEASE_TAG already exists." >> "$GITHUB_STEP_SUMMARY"
              echo "No version bump was detected, so the release workflow will stop successfully without rebuilding assets." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_state=missing" >> "$GITHUB_OUTPUT"
            echo "release_state_reason=Release $RELEASE_TAG does not exist yet; release jobs will run." >> "$GITHUB_OUTPUT"
            echo "Release $RELEASE_TAG does not exist yet. Release jobs will run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check version consistency
        if: steps.release_state.outputs.should_release == 'true'
        run: npm run version:check

      - name: Check Android Play version code
        if: steps.release_state.outputs.should_release == 'true'
        run: npm run version:android-code:check

  android-debug:
    name: Android APK Debug 🤖
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_release == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36.1" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: npm run android:assemble:debug

      - name: Prepare debug APK asset
        run: |
          mkdir -p dist
          cp android-tv-app/app/build/outputs/apk/debug/app-debug.apk \
            "dist/ha-tv-pip-android-debug-v${{ needs.setup.outputs.version }}.apk"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: dist/ha-tv-pip-android-debug-v${{ needs.setup.outputs.version }}.apk
          if-no-files-found: error

  android-release:
    name: Android APK Release 🤖
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_release == 'true'
    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      HA_TV_PIP_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      HA_TV_PIP_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      HA_TV_PIP_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36.1" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check signing secret completeness
        run: |
          configured=0
          for value in \
            "$ANDROID_RELEASE_KEYSTORE_BASE64" \
            "$HA_TV_PIP_RELEASE_STORE_PASSWORD" \
            "$HA_TV_PIP_RELEASE_KEY_ALIAS" \
            "$HA_TV_PIP_RELEASE_KEY_PASSWORD"; do
            if [ -n "$value" ]; then
              configured=$((configured + 1))
            fi
          done

          if [ "$configured" -ne 0 ] && [ "$configured" -ne 4 ]; then
            echo "Android release signing is partially configured. Set all signing secrets or none of them."
            exit 1
          fi

      - name: Decode release keystore
        if: env.ANDROID_RELEASE_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p "$RUNNER_TEMP/ha-tv-pip-signing"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/ha-tv-pip-signing/release.keystore"
          echo "HA_TV_PIP_RELEASE_STORE_FILE=$RUNNER_TEMP/ha-tv-pip-signing/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        run: npm run android:assemble:release

      - name: Verify signed release APK
        if: env.ANDROID_RELEASE_KEYSTORE_BASE64 != ''
        run: $ANDROID_HOME/build-tools/37.0.0/apksigner verify --verbose android-tv-app/app/build/outputs/apk/release/app-release.apk

      - name: Prepare release APK asset
        run: |
          mkdir -p dist
          if [ -f android-tv-app/app/build/outputs/apk/release/app-release.apk ]; then
            cp android-tv-app/app/build/outputs/apk/release/app-release.apk \
              "dist/ha-tv-pip-android-release-v${{ needs.setup.outputs.version }}.apk"
          else
            cp android-tv-app/app/build/outputs/apk/release/app-release-unsigned.apk \
              "dist/ha-tv-pip-android-release-v${{ needs.setup.outputs.version }}.apk"
          fi

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: dist/ha-tv-pip-android-release-v${{ needs.setup.outputs.version }}.apk
          if-no-files-found: error

  android-bundle:
    name: Android AAB Release 📦
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_release == 'true'
    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      HA_TV_PIP_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      HA_TV_PIP_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      HA_TV_PIP_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36.1" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check signing secret completeness
        run: |
          configured=0
          for value in \
            "$ANDROID_RELEASE_KEYSTORE_BASE64" \
            "$HA_TV_PIP_RELEASE_STORE_PASSWORD" \
            "$HA_TV_PIP_RELEASE_KEY_ALIAS" \
            "$HA_TV_PIP_RELEASE_KEY_PASSWORD"; do
            if [ -n "$value" ]; then
              configured=$((configured + 1))
            fi
          done

          if [ "$configured" -ne 0 ] && [ "$configured" -ne 4 ]; then
            echo "Android release signing is partially configured. Set all signing secrets or none of them."
            exit 1
          fi

      - name: Decode release keystore
        if: env.ANDROID_RELEASE_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p "$RUNNER_TEMP/ha-tv-pip-signing"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/ha-tv-pip-signing/release.keystore"
          echo "HA_TV_PIP_RELEASE_STORE_FILE=$RUNNER_TEMP/ha-tv-pip-signing/release.keystore" >> "$GITHUB_ENV"

      - name: Build release AAB
        run: npm run android:bundle:release

      - name: Prepare release AAB asset
        run: |
          mkdir -p dist
          cp android-tv-app/app/build/outputs/bundle/release/app-release.aab \
            "dist/ha-tv-pip-android-release-v${{ needs.setup.outputs.version }}.aab"

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: dist/ha-tv-pip-android-release-v${{ needs.setup.outputs.version }}.aab
          if-no-files-found: error

  ha-integration:
    name: HA Integration Release 🏠
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_release == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package Home Assistant integration
        run: npm run package:integration

      - name: Upload HA integration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ha-integration-zips
          path: |
            dist/ha-tv-pip-integration-v${{ needs.setup.outputs.version }}.zip
            dist/ha-tv-pip-integration.zip
          if-no-files-found: error

  release-check:
    name: Release Asset Check 🔎
    runs-on: ubuntu-latest
    needs:
      - setup
      - android-debug
      - android-release
      - android-bundle
      - ha-integration
    if: needs.setup.outputs.should_release == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check release assets
        run: npm run package:release:check

  play-store-upload:
    name: Play Store AAB Upload 📲
    runs-on: ubuntu-latest
    needs:
      - setup
      - android-bundle
      - release-check
    if: needs.setup.outputs.should_release == 'true'
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      PLAY_STORE_UPLOAD_ENABLED: ${{ vars.PLAY_STORE_UPLOAD_ENABLED }}
      PLAY_STORE_TRACK: ${{ vars.PLAY_STORE_TRACK || 'internal' }}
      PLAY_STORE_RELEASE_STATUS: ${{ vars.PLAY_STORE_RELEASE_STATUS || 'draft' }}
      PLAY_STORE_CHANGES_NOT_SENT_FOR_REVIEW: ${{ vars.PLAY_STORE_CHANGES_NOT_SENT_FOR_REVIEW || 'true' }}

    steps:
      - name: Check Play Store upload config
        id: play_store_config
        run: |
          enabled=$(printf '%s' "$PLAY_STORE_UPLOAD_ENABLED" | tr '[:upper:]' '[:lower:]')
          changes_not_sent_for_review=$(printf '%s' "$PLAY_STORE_CHANGES_NOT_SENT_FOR_REVIEW" | tr '[:upper:]' '[:lower:]')

          if [ "$enabled" != "true" ]; then
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
            echo "Play Store upload is disabled. Set repository variable PLAY_STORE_UPLOAD_ENABLED=true to enable it." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::PLAY_STORE_UPLOAD_ENABLED is true, but GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is not configured."
            exit 1
          fi

          if [ -z "$PLAY_STORE_TRACK" ]; then
            echo "::error::PLAY_STORE_TRACK must not be empty."
            exit 1
          fi

          case "$PLAY_STORE_RELEASE_STATUS" in
            completed|draft|halted|inProgress) ;;
            *)
              echo "::error::PLAY_STORE_RELEASE_STATUS must be one of completed, draft, halted, or inProgress."
              exit 1
              ;;
          esac

          case "$changes_not_sent_for_review" in
            true|false) ;;
            *)
              echo "::error::PLAY_STORE_CHANGES_NOT_SENT_FOR_REVIEW must be true or false."
              exit 1
              ;;
          esac

          echo "PLAY_STORE_CHANGES_NOT_SENT_FOR_REVIEW=$changes_not_sent_for_review" >> "$GITHUB_ENV"
          echo "should_upload=true" >> "$GITHUB_OUTPUT"
          {
            echo "Play Store upload enabled."
            echo "Track: $PLAY_STORE_TRACK"
            echo "Release status: $PLAY_STORE_RELEASE_STATUS"
            echo "Changes not sent for review: $changes_not_sent_for_review"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download release AAB artifact
        if: steps.play_store_config.outputs.should_upload == 'true'
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab
          path: dist

      - name: Upload AAB to Play Store
        if: steps.play_store_config.outputs.should_upload == 'true'
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hatvpip.receiver
          releaseFiles: dist/ha-tv-pip-android-release-v${{ needs.setup.outputs.version }}.aab
          tracks: ${{ env.PLAY_STORE_TRACK }}
          releaseName: HA TV PiP v${{ needs.setup.outputs.version }}
          status: ${{ env.PLAY_STORE_RELEASE_STATUS }}
          changesNotSentForReview: ${{ env.PLAY_STORE_CHANGES_NOT_SENT_FOR_REVIEW }}

  publish:
    name: Publish Release 🚀
    runs-on: ubuntu-latest
    needs:
      - setup
      - android-debug
      - android-release
      - android-bundle
      - ha-integration
      - release-check
      - play-store-upload
    if: needs.setup.outputs.should_release == 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release assets
        run: ls -la dist

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.setup.outputs.tag }}
          RELEASE_VERSION: ${{ needs.setup.outputs.version }}
        run: |
          PREVIOUS_TAG=$(gh release list \
            --limit 20 \
            --json tagName,isDraft \
            --jq '[.[] | select(.isDraft | not) | select(.tagName != env.RELEASE_TAG)][0].tagName // ""')
          PREVIOUS_VERSION="${PREVIOUS_TAG#v}"

          if [ -n "$PREVIOUS_VERSION" ]; then
            node scripts/generate-release-notes.mjs \
              --version "$RELEASE_VERSION" \
              --since "$PREVIOUS_VERSION" \
              --output dist/release-notes.md
          else
            node scripts/generate-release-notes.mjs \
              --version "$RELEASE_VERSION" \
              --output dist/release-notes.md
          fi

      - name: Create draft GitHub Release with assets
        id: release_assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.setup.outputs.tag }}
          RELEASE_VERSION: ${{ needs.setup.outputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')
            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release $RELEASE_TAG already exists and is published."
              echo "Published releases can be immutable, so assets will not be replaced."
              echo "publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            gh release upload "$RELEASE_TAG" \
              "dist/ha-tv-pip-android-debug-v$RELEASE_VERSION.apk" \
              "dist/ha-tv-pip-android-release-v$RELEASE_VERSION.apk" \
              "dist/ha-tv-pip-android-release-v$RELEASE_VERSION.aab" \
              "dist/ha-tv-pip-integration-v$RELEASE_VERSION.zip" \
              "dist/ha-tv-pip-integration.zip" \
              --clobber
            gh release edit "$RELEASE_TAG" --notes-file dist/release-notes.md
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            "dist/ha-tv-pip-android-debug-v$RELEASE_VERSION.apk" \
            "dist/ha-tv-pip-android-release-v$RELEASE_VERSION.apk" \
            "dist/ha-tv-pip-android-release-v$RELEASE_VERSION.aab" \
            "dist/ha-tv-pip-integration-v$RELEASE_VERSION.zip" \
            "dist/ha-tv-pip-integration.zip" \
            --draft \
            --target "${{ github.sha }}" \
            --title "HA TV PiP v$RELEASE_VERSION" \
            --notes-file dist/release-notes.md
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: steps.release_assets.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.setup.outputs.tag }}
        run: gh release edit "$RELEASE_TAG" --draft=false

  cleanup:
    name: Cleanup 🧹
    runs-on: ubuntu-latest
    needs:
      - setup
      - android-debug
      - android-release
      - android-bundle
      - ha-integration
      - release-check
      - play-store-upload
      - publish
    if: always()

    steps:
      - name: Finish release workflow
        if: always()
        env:
          RELEASE_STATE: ${{ needs.setup.outputs.release_state }}
          RELEASE_STATE_REASON: ${{ needs.setup.outputs.release_state_reason }}
          SHOULD_RELEASE: ${{ needs.setup.outputs.should_release }}
        run: |
          echo "Release state: $RELEASE_STATE"
          echo "Should release: $SHOULD_RELEASE"
          echo "$RELEASE_STATE_REASON"
          echo "Release workflow cleanup complete."
          echo "Runner workspaces are ephemeral; uploaded workflow artifacts are retained for audit."
