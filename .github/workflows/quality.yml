name: Quality ✅

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  android-lint:
    name: "android: lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android lint
        run: npm run android:lint

  android-typecheck:
    name: "android: typecheck"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android typecheck
        run: npm run android:typecheck

  android-test:
    name: "android: test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android unit tests
        run: npm run android:test

  android-build-dry-run:
    name: "android: build dry-run"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        run: npm run android:build:dry-run

  ha-integration-lint:
    name: "ha-integration: lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dev tools
        run: python -m pip install -r ha-integration/requirements-dev.txt

      - name: Run Home Assistant integration lint
        run: npm run ha:lint

  ha-integration-typecheck:
    name: "ha-integration: typecheck"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dev tools
        run: python -m pip install -r ha-integration/requirements-dev.txt

      - name: Run Home Assistant integration typecheck
        run: npm run ha:typecheck

  ha-integration-test:
    name: "ha-integration: test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dev tools
        run: python -m pip install -r ha-integration/requirements-dev.txt

      - name: Run Home Assistant integration tests
        run: npm run ha:test

  ha-integration-build-dry-run:
    name: "ha-integration: build dry-run"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package Home Assistant integration
        run: npm run ha:build:dry-run

  website-lint:
    name: "website: lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install website dependencies
        run: npm --prefix website install

      - name: Run website lint
        run: npm run website:lint

  website-typecheck:
    name: "website: typecheck"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install website dependencies
        run: npm --prefix website install

      - name: Run website typecheck
        run: npm run website:typecheck

  website-test:
    name: "website: test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install website dependencies
        run: npm --prefix website install

      - name: Run website tests
        run: npm run website:test

  website-build-dry-run:
    name: "website: build dry-run"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install website dependencies
        run: npm --prefix website install

      - name: Build website
        run: npm run website:build:dry-run
